<!doctype html>
<html lang="ja">

         policy stops inline/foreign scripts from running. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none';
               script-src 'self' https://cdn.jsdelivr.net https://www.googletagmanager.com;

               font-src https://fonts.gstatic.com;

               base-uri 'none';
               form-action 'none';"
    />
    <title>一日一字（く） — One Japanese kanji group a day</title>
    <meta
      name="description"
      content="一日一字（く） (ichinichi-ichijiku) — learn one Japanese kanji group a day: a radical (部首) or a phonetic (形声) component. Tap to reveal its meaning, the words it appears in, the reading it lends, and its kanji family."
    />
    <meta
      name="keywords"
      content="Japanese kanji, 漢字, radicals, 部首, phonetic components, 形声, 一日一字, learn Japanese, JLPT, on'yomi"
    />
    <meta name="author" content="vbkmr" />

  <body>
    <main class="site">
      <div class="hero">
        <p class="eyebrow">
          <img class="mark" src="assets/fig.svg" alt="" width="18" height="18" />一日一字

        </p>
        <button id="word" class="word" aria-expanded="false" aria-controls="panel"></button>
        <p id="reading" class="reading"></p>
        <p id="question" class="question"></p>
        <p id="hint" class="hint">tap to reveal · double-tap for a new 字</p>
        <section id="panel" class="panel hidden" aria-live="polite"></section>
        <p id="progress" class="progress"></p>
      </div>
    </main>
